<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>REDIL — Total App GT</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#1a3a5c,#2563a8);
    height:100vh;display:flex;align-items:center;justify-content:center;color:#fff}
  .card{background:rgba(255,255,255,.1);backdrop-filter:blur(12px);border-radius:20px;
    padding:40px;text-align:center;max-width:420px;width:90%;border:1px solid rgba(255,255,255,.2);
    box-shadow: 0 20px 50px rgba(0,0,0,0.3)}
  /* Estilo para tu logo */
  .logo-container{width:100px;height:100px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center}
  .logo-img{max-width:100%;max-height:100%;object-fit:contain;border-radius:15px}
  
  h1{font-size:28px;font-weight:900;margin-bottom:8px;letter-spacing:1px}
  p{font-size:15px;opacity:.9;margin-bottom:24px;font-weight:300}
  
  .status-text{font-size:13px;margin-top:15px;color:#00d4ff;font-weight:600;display:none}
  
  .btn{display:inline-block;background:#fff;color:#1a3a5c;font-weight:800;font-size:15px;
    padding:14px 32px;border-radius:10px;text-decoration:none;border:none;cursor:pointer;
    transition:.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)}
  .btn:hover{transform:translateY(-3px);box-shadow:0 10px 25px rgba(0,0,0,0.3);background:#f0f0f0}
  
  .spinner{display:none;width:35px;height:35px;border:4px solid rgba(255,255,255,.2);
    border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin:20px auto 0}
  @keyframes spin{to{transform:rotate(360deg)}}
  
  .brand-link{display:block;font-size:12px;color:rgba(255,255,255,.5);text-decoration:none;margin-top:30px;transition:.2s}
  .brand-link:hover{color:#fff;opacity:1}
</style>
</head>
<body>
<div class="card">
  <div class="logo-container">
    <img src="https://lh3.googleusercontent.com/d/12XCmz_u8yYRaNpiM8ZIgPTjHIzsYialc" alt="Logo REDIL" class="logo-img">
  </div>
  <h1>REDIL</h1>
  <p id="msg-principal">Sistema de Gestión de Grupos Familiares</p>
  
  <button id="mainBtn" class="btn" onclick="irAlSistema()">Ingresar al Sistema</button>
  
  <div class="spinner" id="spin"></div>
  <div id="loading-text" class="status-text">CARGANDO SISTEMA...</div>

  <a href="#" class="brand-link">Desarrollado por <strong>Total App GT</strong></a>
</div>

<script>
// Configuración de URL
var URL_SISTEMA = 'https://script.google.com/macros/s/AKfycby0CPxmvmVM-p9GwKtmq-00lptUUIJ8ijiNSqHJgKNxnt5DIAR9_Nk3kW9VN122FQi2qw/exec';

function irAlSistema(){
  // Cambios visuales al hacer clic
  document.getElementById('mainBtn').style.display = 'none';
  document.getElementById('msg-principal').innerText = 'Iniciando sesión segura...';
  document.getElementById('spin').style.display = 'block';
  document.getElementById('loading-text').style.display = 'block';
  
  // Redirección con un pequeño retraso para mejorar la experiencia de usuario
  setTimeout(function(){
    window.location.href = URL_SISTEMA;
  }, 1000);
}

// Auto-redirección automática al entrar si prefieres que no tengan que dar clic
window.onload = function() {
  // Opcional: Descomenta la línea de abajo si quieres que entre solo a los 2 segundos
  // setTimeout(irAlSistema, 2000); 
};
</script>
</body>
</html>
