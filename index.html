<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>REDIL — Total App GT</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,#1a3a5c,#2563a8);
    height:100vh;display:flex;align-items:center;justify-content:center;color:#fff}
  .card{background:rgba(255,255,255,.1);backdrop-filter:blur(15px);border-radius:24px;
    padding:50px 40px;text-align:center;max-width:420px;width:90%;border:1px solid rgba(255,255,255,.2);
    box-shadow:0 25px 50px rgba(0,0,0,0.3)}
  .logo-container{width:110px;height:110px;margin:0 auto 20px;background:#fff;border-radius:20px;
    display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 8px 20px rgba(0,0,0,0.2)}
  .logo-img{width:90%;height:90%;object-fit:contain}
  h1{font-size:32px;font-weight:900;margin-bottom:4px;letter-spacing:2px}
  .subtitle{font-size:16px;opacity:.9;margin-bottom:30px;font-weight:400;color:#00d4ff}
  .loading-box{margin-top:20px}
  .spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,.1);
    border-top-color:#00d4ff;border-radius:50%;animation:spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;margin:0 auto 15px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#fff;animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
  .brand{font-size:11px;opacity:.4;margin-top:40px;text-decoration:none;color:#fff}
</style>
</head>
<body>
<div class="card">
  <div class="logo-container">
    <img src="https://lh3.googleusercontent.com/d/12XCmz_u8yYRaNpiM8ZIgPTjHIzsYialc" alt="Logo" class="logo-img">
  </div>
  <h1>REDIL</h1>
  <div class="subtitle">Sistema de Gestión Profesional</div>
  
  <div class="loading-box">
    <div class="spinner"></div>
    <div class="loading-text">Cargando sistema...</div>
  </div>

  <div class="brand">Desarrollado por <strong>Total App GT</strong></div>
</div>

<script>
// CONFIGURACIÓN: Pega aquí tu link de Apps Script
var URL_SISTEMA = 'https://script.google.com/macros/s/AKfycby0CPxmvmVM-p9GwKtmq-00lptUUIJ8ijiNSqHJgKNxnt5DIAR9_Nk3kW9VN122FQi2qw/exec';

// Redirección automática tras 2.5 segundos para presencia de marca
window.onload = function() {
  if(URL_SISTEMA && URL_SISTEMA !== ''){
    setTimeout(function(){
      window.location.href = URL_SISTEMA;
    }, 2500);
  } else {
    alert('Error: URL del sistema no configurada.');
  }
};
</script>
</body>
</html>
