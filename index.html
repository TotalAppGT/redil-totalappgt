<!DOCTYPE html>
<html lang="es">

</head>
<body>

  <script>
    /* ==========================================
       CONFIGURACIÓN: SOLO PEGA EL LINK AQUÍ

    var URL_SISTEMA = 'AQUÍ_VA_EL_LINK_DE_GOOGLE_SCRIPT';

    window.onload = function() {
